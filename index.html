<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Follower Booster Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 80vh;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            background: var(--tg-theme-secondary-bg-color, #f4f4f5);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: var(--tg-theme-button-color, #2481cc);
        }

        p {
            font-size: 14px;
            opacity: 0.8;
        }

        input[type="text"] {
            width: 90%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
        }

        button {
            width: 95%;
            padding: 12px;
            background-color: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚀 Follower Booster</h1>
    <p>Enter your username below to start processing your request.</p>
    
    <input type="text" id="username" placeholder="@username" required>
    <button id="submitBtn">Submit Request</button>
</div>

<script>
    // Initialize Telegram WebApp
    const tg = window.Telegram.WebApp;
    tg.expand(); // Expands the mini app to full height

    const submitBtn = document.getElementById('submitBtn');
    const usernameInput = document.getElementById('username');

    submitBtn.addEventListener('click', () => {
        const username = usernameInput.value.trim();

        if (!username) {
            tg.showAlert('Please enter a valid username!');
            return;
        }

        // Prepare data payload
        const dataPayload = {
            username: username,
            action: 'request_followers',
            timestamp: Date.now()
        };

        // Send data back to the Telegram Bot
        // NOTE: This only works if the Mini App was opened via a KeyboardButton
        tg.sendData(JSON.stringify(dataPayload));
        
        // Close the mini app after sending data
        tg.close();
    });
</script>

</body>
</html>
